<html>
    <head>
        <title>Final Project</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap" rel="stylesheet"/>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
        <link rel="stylesheet" href="style.css">
        <script src="starmap.js" defer></script>
    </head>
    <body class="starmap">
        <canvas id="stars">stars</canvas>
        <h1>Galaxy Map</h1>

        <div id="map">
<a class="planet" id="coruscant" href="planets/coruscant.html">
                <img class="orb" src="images/coruscant.png" alt="Coruscant"/>
                <span class="name">CORUSCANT</span>
            </a>

            <a class="planet" id="tatooine" href="planets/tatooine.html">
                <img class="orb" src="images/tatooine.png" alt="Tatooine"/>
                <span class="name">TATOOINE</span>
            </a>

            <a class="planet" id="naboo" href="planets/naboo.html">
                <img class="orb" src="images/naboo.png" alt="Naboo"/>
                <span class="name">NABOO</span>
            </a>

            <a class="planet" id="hoth" href="planets/hoth.html">
                <img class="orb" src="images/hoth.jpg" alt="Hoth"/>
                <span class="name">HOTH</span>
            </a>
        </div>
        <footer>IST 250 Final Project &mdash; Rymer Popovich</footer>

        <button id="contact-btn" data-bs-toggle="modal" data-bs-target="#contactModal">CONTACT</button>

        <div class="modal fade" id="contactModal" tabindex="-1" aria-labelledby="contactModalLabel" aria-hidden="true">
            <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content" id="contact-modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title" id="contactModalLabel">CONTACT</h5>
                        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        <p id="contact-email">rymerpopovich@gmail.com</p>
                        <form id="contact-form">
                            <div class="mb-3">
                                <label for="contact-name" class="form-label">Name</label>
                                <input type="text" class="form-control" id="contact-name" required/>
                            </div>
                            <div class="mb-3">
                                <label for="contact-message" class="form-label">Message</label>
                                <textarea class="form-control" id="contact-message" rows="4" required></textarea>
                            </div>
                            <div id="contact-success" class="alert alert-success d-none">Message sent!</div>
                            <button type="submit" class="btn btn-warning w-100">SEND</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
        <script>
            document.getElementById('contact-form').addEventListener('submit', function(e) {
                e.preventDefault();
                this.querySelector('button[type="submit"]').classList.add('d-none');
                document.getElementById('contact-success').classList.remove('d-none');
            });
            document.getElementById('contactModal').addEventListener('hidden.bs.modal', function() {
                document.getElementById('contact-form').reset();
                document.getElementById('contact-success').classList.add('d-none');
                document.querySelector('#contact-form button[type="submit"]').classList.remove('d-none');
            });
        </script>
    </body>
</html>
